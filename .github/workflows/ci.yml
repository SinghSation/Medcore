# Continuous-integration gates.
#
# Originally landed as Phase 3I.2 (backend + governance + secret
# scanning). Extended in VS1 Chunk G (4D.4) with frontend + E2E
# gates so the DoD + PHI-leakage discipline proved locally in
# Chunk F is enforced at merge time, not just at developer memory.
#
# Branch-protection rules (configured in GitHub repo settings →
# Branches) must require ALL five jobs to pass before a PR can
# merge — see docs/runbooks/ci-cd.md for the setup steps.
#
# Gate matrix:
#   test         -- ./gradlew test (includes 3I.1 ArchUnit rules
#                   + Flyway migration validation via
#                   Testcontainers; a failing architectural
#                   invariant or a broken migration fails the
#                   build).
#   web          -- pnpm typecheck (src + e2e tsconfig) + Vitest
#                   unit/component suite + production build of
#                   apps/web. Fast fail for frontend regressions.
#   e2e          -- Full Playwright suite against a live stack:
#                   Postgres + mock-oauth2-server as service
#                   containers, API + Vite as background processes.
#                   Enforces the VS1 Chunk F DoD bounds (≤3 clicks,
#                   ≤90s to note-saved) plus the PHI-leakage scan
#                   (storage / cookies / console). Needs: [test, web].
#   governance   -- Roadmap-Phase trailer on every commit in the
#                   PR range (ADR-005 §2.5); doc-staleness check
#                   with Review-Deferred:<reason> escape hatch.
#   secret-scan  -- Gitleaks scans working tree + git history for
#                   leaked secret patterns. License-free binary
#                   invocation (no paid action dependency).
#
# Cross-cutting design decisions:
#   - pull_request events use github.event.pull_request.base.sha
#     / head.sha explicitly (more robust than `origin/main..HEAD`
#     in rebases + squash-merge flows).
#   - push events to main use github.event.before..github.sha so
#     the gates still enforce on direct pushes (belt-and-braces
#     for cases where branch protection is not yet on).
#   - Testcontainers runs out-of-the-box on ubuntu-latest; no
#     custom Docker setup required.

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: test (gradle + ArchUnit + migrations)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so governance job can resolve the PR
          # commit range. Test job inherits the same checkout
          # policy for consistency.
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run gradle test
        working-directory: apps/api
        run: ./gradlew test --console=plain --no-daemon

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: apps/api/build/reports/tests/
          retention-days: 7

  governance:
    name: governance (trailer + doc-staleness)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history to iterate the PR commit range.
          fetch-depth: 0

      - name: Resolve commit range
        id: range
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE="$PR_BASE_SHA"
            HEAD="$PR_HEAD_SHA"
          else
            BASE="$PUSH_BEFORE"
            HEAD="$PUSH_AFTER"
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "head=$HEAD" >> "$GITHUB_OUTPUT"
          echo "Commit range: $BASE..$HEAD"

      - name: Check Roadmap-Phase trailer on every commit
        env:
          BASE: ${{ steps.range.outputs.base }}
          HEAD: ${{ steps.range.outputs.head }}
        run: |
          set -euo pipefail
          # First-push edge case: `github.event.before` is the
          # zero-SHA when the branch is being pushed for the
          # first time (e.g., initial repo setup). Nothing to
          # compare against; skip gracefully.
          if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "First push on branch (no base) — skipping trailer check"
            exit 0
          fi

          # Roadmap-Phase must be present AND non-empty on every
          # commit body in the range. ADR-005 §2.5 + AGENTS.md §4.7.3.
          missing=""
          while IFS= read -r sha; do
            [ -z "$sha" ] && continue
            body="$(git show -s --format=%B "$sha")"
            if ! printf '%s\n' "$body" | grep -qE '^Roadmap-Phase:[[:space:]]+\S'; then
              subject="$(git show -s --format=%s "$sha")"
              missing="${missing}  - ${sha:0:12} — ${subject}"$'\n'
            fi
          done < <(git log --format='%H' "$BASE..$HEAD")

          if [ -n "$missing" ]; then
            echo "::error::The following commits are missing a non-empty Roadmap-Phase trailer:"
            printf '%s' "$missing"
            echo ""
            echo "Every commit body MUST include a line like:"
            echo "  Roadmap-Phase: 3I.2 (CI enforcement)"
            echo ""
            echo "See ADR-005 §2.5 and AGENTS.md §4.7.3 for the full rule."
            exit 1
          fi

          echo "All commits in range carry a Roadmap-Phase trailer."

      - name: Check doc staleness
        env:
          BASE: ${{ steps.range.outputs.base }}
          HEAD: ${{ steps.range.outputs.head }}
        run: |
          set -euo pipefail
          if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "First push on branch (no base) — skipping doc-staleness check"
            exit 0
          fi
          python3 << 'PYEOF'
          import os, re, subprocess, sys
          from datetime import date

          PRODUCT_DIR = "docs/product"
          today = date.today()
          stale = []

          for fname in sorted(os.listdir(PRODUCT_DIR)):
              if not fname.endswith(".md"):
                  continue
              path = os.path.join(PRODUCT_DIR, fname)
              with open(path, encoding="utf-8") as f:
                  content = f.read()
              m = re.match(r'^---\n(.*?)\n---', content, re.DOTALL)
              if not m:
                  continue
              fm = m.group(1)
              nr = re.search(r'^\s*next_review:\s*(\d{4}-\d{2}-\d{2})', fm, re.MULTILINE)
              if not nr:
                  continue
              try:
                  nr_date = date.fromisoformat(nr.group(1))
              except ValueError:
                  continue
              if nr_date < today:
                  stale.append((path, nr_date))

          if not stale:
              print("All docs/product/ files are within their review window.")
              sys.exit(0)

          base = os.environ["BASE"]
          head = os.environ["HEAD"]
          log_out = subprocess.check_output(
              ["git", "log", "--format=%B%n__COMMIT_END__", f"{base}..{head}"],
              text=True,
          )
          # Review-Deferred MUST carry a non-empty reason. Empty
          # escape hatches become permanent loopholes (ADR-005
          # §2.5 pressure-test refinement).
          deferred = bool(re.search(r'^Review-Deferred:\s+\S', log_out, re.MULTILINE))

          if deferred:
              print(f"Doc staleness detected in {len(stale)} file(s); Review-Deferred trailer with reason found — OK.")
              for path, d in stale:
                  print(f"  - {path}: next_review was {d}")
              sys.exit(0)

          print("::error::The following docs/product/ files have passed next_review dates:")
          for path, d in stale:
              print(f"  - {path}: next_review was {d}")
          print("")
          print("To proceed, EITHER update the next_review date in the affected file(s),")
          print("OR add a trailer to a commit in this PR of the form:")
          print("  Review-Deferred: <non-empty reason why the review is deferred>")
          print("")
          print("Empty Review-Deferred lines are rejected — the reason must be present")
          print("so the deferral is reviewable in git history.")
          sys.exit(1)
          PYEOF

  web:
    name: web (pnpm typecheck + test + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        # Version comes from `package.json` `packageManager` field
        # — single source of truth. Specifying `version:` here too
        # makes pnpm/action-setup@v4 refuse with ERR_PNPM_BAD_PM_VERSION.

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (incl. e2e tsconfig)
        working-directory: apps/web
        run: pnpm typecheck

      - name: Vitest (unit + component)
        working-directory: apps/web
        run: pnpm test

      - name: Production build
        working-directory: apps/web
        run: pnpm build

  e2e:
    name: e2e (Playwright live stack)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Gate runs after the cheap fast-fail gates pass. No sense
    # spinning up Postgres + the API + Vite when a PR has a
    # compile error or a failing Vitest case.
    needs: [test, web]
    services:
      postgres:
        image: postgres:16.4
        env:
          POSTGRES_USER: medcore
          POSTGRES_PASSWORD: ci-ephemeral-password
          POSTGRES_DB: medcore_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U medcore -d medcore_dev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      mock-oauth2:
        # Pinned to the same tag docker-compose.yml uses in local
        # dev so behavior is identical between the two surfaces.
        # The image has no curl/nc, so we poll the well-known
        # endpoint from the job instead of using --health-cmd.
        image: ghcr.io/navikt/mock-oauth2-server:2.1.10
        env:
          SERVER_PORT: "8888"
        ports:
          - 8888:8888
    env:
      # ---- DB (admin + runtime) ----
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: medcore
      POSTGRES_PASSWORD: ci-ephemeral-password
      POSTGRES_DB: medcore_dev
      MEDCORE_DB_APP_USER: medcore_app
      MEDCORE_DB_APP_PASSWORD: ci-only-do-not-reuse
      MEDCORE_DB_APP_PASSWORD_SYNC_ENABLED: "true"
      # ---- OIDC ----
      MEDCORE_OIDC_ISSUER_URI: http://localhost:8888/default
      # ---- OTLP (non-empty to satisfy validators; no collector
      #           running so exports warn + drop silently) ----
      MEDCORE_OTLP_TRACING_ENDPOINT: http://localhost:4318/v1/traces
      MEDCORE_OTLP_METRICS_URL: http://localhost:4318/v1/metrics
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        # Version comes from `package.json` `packageManager` field
        # — single source of truth. Specifying `version:` here too
        # makes pnpm/action-setup@v4 refuse with ERR_PNPM_BAD_PM_VERSION.

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers (chromium + deps)
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium

      - name: Wait for mock-oauth2-server
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if curl -fsS http://localhost:8888/default/.well-known/openid-configuration >/dev/null 2>&1; then
              echo "mock-oauth2 ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "mock-oauth2 never became ready"
          exit 1

      - name: Build API jar
        working-directory: apps/api
        run: ./gradlew bootJar --console=plain --no-daemon -x test

      - name: Start API (background)
        working-directory: apps/api
        run: |
          set -euo pipefail
          JAR=$(ls build/libs/medcore-api-*.jar | grep -v plain | head -n1)
          [ -f "$JAR" ] || { echo "bootJar output not found"; ls -la build/libs/; exit 1; }
          nohup java -jar "$JAR" > api.log 2>&1 &
          echo $! > api.pid

      - name: Wait for API health
        run: |
          set -euo pipefail
          for i in {1..120}; do
            if curl -fsS http://localhost:8080/actuator/health >/dev/null 2>&1; then
              echo "API healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "API never became healthy"
          cat apps/api/api.log || true
          exit 1

      - name: Start Vite (background)
        working-directory: apps/web
        run: |
          nohup pnpm dev > vite.log 2>&1 &
          echo $! > vite.pid

      - name: Wait for Vite
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if curl -fsS http://localhost:5173 >/dev/null 2>&1; then
              echo "Vite up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Vite never came up"
          cat apps/web/vite.log || true
          exit 1

      - name: Run Playwright E2E
        working-directory: apps/web
        run: pnpm e2e

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: apps/web/test-results/
          retention-days: 7

      - name: Upload API + Vite logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: service-logs
          path: |
            apps/api/api.log
            apps/web/vite.log
          retention-days: 7

  secret-scan:
    name: secret-scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Scan full history, not just the latest commit — a
          # secret that was pushed and later "removed" is still
          # visible to anyone who clones the repo, so the
          # appropriate remediation is rotate-and-rewrite, not
          # delete-and-forget. Gitleaks scanning full history
          # surfaces such secrets.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.21.0
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz gitleaks
          chmod +x gitleaks
          ./gitleaks version

      - name: Run gitleaks
        run: |
          set -euo pipefail
          # --source: scan working directory + git history
          # --redact: replace matched secrets in output with
          #           [REDACTED] so CI logs don't re-leak the
          #           credential (even if the repo is later made
          #           private, logs may persist in GitHub Actions
          #           retention).
          # --verbose: per-match detail for remediation
          # Exit code: non-zero if any secret found → job fails.
          ./gitleaks detect --source . --redact --verbose
