# -----------------------------------------------------------------------------
# Medcore — local services
#
# Developer-workstation compose. NOT production configuration. Production
# infrastructure lives in infra/terraform/ (ADR-001 §6).
#
# Phase 3A services:
#   - postgres           — primary relational store (ADR-001)
#   - mock-oauth2-server — local OIDC IdP for development (ADR-002). Dev-only;
#                          production IdP choice is deferred to a later ADR.
#
# Usage:
#   1. Create a .env file at the repo root (gitignored). Minimum content:
#        POSTGRES_PASSWORD=<choose-a-local-password>
#   2. docker compose up -d postgres mock-oauth2-server
#   3. docker compose ps   — both services should report "running"/"healthy".
#
# See docs/runbooks/local-services.md for the full operator guide.
# -----------------------------------------------------------------------------

services:
  postgres:
    image: postgres:16.4
    container_name: medcore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medcore}
      POSTGRES_DB: ${POSTGRES_DB:-medcore_dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env or the environment}
      PGTZ: UTC
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mock-oauth2-server:
    # Dev-only OIDC provider. MedcoreOidcProperties rejects this issuer
    # under the `prod` profile (ADR-002 §2 guardrail). Default configuration
    # exposes issuer `http://localhost:${MOCK_OAUTH2_PORT:-8888}/default`;
    # tokens may be minted via the `/default/token` endpoint. No realm setup
    # is required for Phase 3A; test-user shaping lives in tests.
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    container_name: medcore-mock-oauth2-server
    restart: unless-stopped
    environment:
      SERVER_PORT: "8888"
    ports:
      - "${MOCK_OAUTH2_PORT:-8888}:8888"

volumes:
  postgres_data:
