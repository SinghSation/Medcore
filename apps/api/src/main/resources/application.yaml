spring:
  application:
    name: medcore-api

  # Application (runtime) datasource — connects as the LEAST-PRIVILEGE
  # role `medcore_app` so RLS policies installed by V8 actually enforce
  # on live request traffic (Phase 3E). Per ADR-001 §2 + ADR-004,
  # connecting as a superuser here would bypass RLS by Postgres design
  # and would block the Phase 4 / PHI-bearing slices.
  #
  # `MEDCORE_DB_APP_PASSWORD` MUST be set out-of-band (secret manager
  # in production; env var in local dev). The same value is supplied to
  # Flyway as a placeholder so V10's `ALTER ROLE medcore_app WITH
  # PASSWORD '${app_password}'` materialises the role correctly.
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:medcore_dev}
    username: ${MEDCORE_DB_APP_USER:medcore_app}
    password: ${MEDCORE_DB_APP_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: medcore-hikari

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  # Migrator datasource — owns DDL. In local dev / tests the migrator
  # is the container superuser; in production it is the dedicated
  # `medcore_migrator` role provisioned by ops. The `placeholders.app_password`
  # entry feeds V10's role-password ALTER from the same env var the
  # application uses to connect.
  flyway:
    enabled: true
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:medcore_dev}
    user: ${MEDCORE_DB_MIGRATOR_USER:${POSTGRES_USER:medcore}}
    password: ${MEDCORE_DB_MIGRATOR_PASSWORD:${POSTGRES_PASSWORD:}}
    locations:
      - classpath:db/migration/identity
      - classpath:db/migration/tenancy
      - classpath:db/migration/audit
    schemas:
      - flyway
      - identity
      - tenancy
      - audit
    default-schema: flyway
    baseline-on-migrate: false
    validate-on-migrate: true

medcore:
  db:
    app:
      # Runtime password for the application's `medcore_app` Postgres role.
      # Sourced from `MEDCORE_DB_APP_PASSWORD` (env / secret manager).
      # The application connects with this value at startup; in production
      # ops provisions the role's password to match this out-of-band.
      password: ${MEDCORE_DB_APP_PASSWORD:}

      # Off by default. When `false` (production-default) the application
      # process only VERIFIES the password env var is non-empty — it does
      # NOT call `ALTER ROLE` and does not need migrator-level capability
      # for role rotation. When `true` (local / tests) the application
      # syncs the role's password against the migrator datasource on every
      # startup. Set to `true` only in environments where having the
      # application carry that capability is acceptable.
      passwordSyncEnabled: ${MEDCORE_DB_APP_PASSWORD_SYNC_ENABLED:false}

  oidc:
    # Dev default points at the local mock-oauth2-server (ADR-002). Override
    # at deploy time via environment variables. Production startup rejects
    # any issuer containing `localhost` or `mock-oauth2-server` (ADR-002 §2).
    issuer-uri: ${MEDCORE_OIDC_ISSUER_URI:http://localhost:8888/default}
    audience: ${MEDCORE_OIDC_AUDIENCE:}
    clock-skew: ${MEDCORE_OIDC_CLOCK_SKEW:30s}

  audit:
    # Phase 3F.4 — scheduled audit-chain integrity verification.
    # Invokes `audit.verify_chain()` (V9, Phase 3D) periodically.
    # Detection only: on break, logs ERROR and emits the audit event
    # `audit.chain.integrity_failed`. On verifier infra failure
    # (DB unreachable, permission denied), emits
    # `audit.chain.verification_failed`. Never calls
    # `audit.rebuild_chain()` — remediation is an operator/migrator
    # concern, not an application one.
    #
    # Defaults are production-safe: enabled by default, hourly
    # cadence, 5-minute start delay to skip cold-start noise,
    # clean-case logs silent (DEBUG). Dev environments override
    # `initial-delay` to 60 and `verbose-clean-log` to true for
    # faster feedback. Test environments disable the scheduler and
    # drive verification directly.
    chain-verification:
      enabled: ${MEDCORE_AUDIT_CHAIN_VERIFICATION_ENABLED:true}
      cron: ${MEDCORE_AUDIT_CHAIN_VERIFICATION_CRON:0 0 * * * *}
      verbose-clean-log: ${MEDCORE_AUDIT_CHAIN_VERIFICATION_VERBOSE_CLEAN_LOG:false}

  observability:
    # Phase 3F.1 — request-id + structured logging substrate.
    # Defaults are production-safe: inbound X-Request-Id is accepted
    # only when it matches the UUID format regex AND is within
    # max-length; otherwise a fresh UUIDv4 is minted. X-Forwarded-For
    # is IGNORED unless a trusted-proxy list is explicitly configured
    # (no spoofable default).
    request-id:
      header-name: ${MEDCORE_REQUEST_ID_HEADER:X-Request-Id}
      id-format: ${MEDCORE_REQUEST_ID_FORMAT:^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$}
      max-length: ${MEDCORE_REQUEST_ID_MAX_LENGTH:128}
      echo-on-response: ${MEDCORE_REQUEST_ID_ECHO:true}
    proxy:
      # Comma-separated list of trusted proxy IPs or CIDR ranges.
      # Configure at deploy time (ALB / CloudFront / CDN egress). Empty
      # in dev / tests — X-Forwarded-For is NOT read and the immediate
      # peer's remote address is returned verbatim.
      trusted-proxies: ${MEDCORE_TRUSTED_PROXIES:}
      forwarded-for-header: ${MEDCORE_FORWARDED_FOR_HEADER:X-Forwarded-For}

# Logging (Phase 3F.1 structured + Phase 3F.2 trace correlation).
#
#  - `structured.format.console=ecs` — default Elastic Common Schema
#    format for the console appender; operator-overridable via
#    MEDCORE_LOG_FORMAT.
#  - `pattern.correlation` — Spring Boot 3.4 adds `traceId` and
#    `spanId` to MDC automatically when micrometer-tracing-bridge-otel
#    is on the classpath; this entry ensures the keys flow into the
#    structured output alongside request_id (Phase 3F.1). Four
#    correlation surfaces (request_id + trace_id + span_id + user_id /
#    tenant_id) now appear in every log line.
logging:
  structured:
    format:
      console: ${MEDCORE_LOG_FORMAT:ecs}
  pattern:
    correlation: "[%X{traceId:-},%X{spanId:-}]"

# Spring Boot Actuator (Phase 3F.3). Only `health` and `info` are
# exposed on the web; every other endpoint (env, metrics, beans,
# mappings, prometheus, etc.) returns 404 at the Spring MVC layer
# before any security filter evaluates. Liveness and readiness
# probes live under `/actuator/health/liveness` and
# `/actuator/health/readiness` per the Spring Boot probes contract;
# the `management.endpoint.health.group.*` blocks below pin which
# health indicators contribute to each probe.
#
# `show-details: never` is deliberate: probes and aggregate health
# are anonymous (see ActuatorSecurityConfig), so we must not reveal
# indicator names, DB versions, or any component graph to an
# unauthenticated caller. The response shape is strictly
# `{"status":"UP"}` | `{"status":"DOWN"}` | etc.
management:
  # Phase 3F.2 — OpenTelemetry traces + metrics.
  # Export endpoints default to unset (empty). The application
  # collects spans and metrics in-process via Micrometer; they are
  # shipped only when an operator points at an OTLP collector.
  # This posture is production-safe (no accidental phone-home) but
  # is logged prominently at startup so operators are not misled
  # into assuming traces exist when they do not. See
  # ObservabilityStartupReporter + TelemetryExportInfoContributor.
  #
  # Sampling probability defaults to 0.1 (prod-safe); dev overrides
  # to 1.0 via env var. Operators MUST raise to 1.0 for the
  # duration of an active incident investigation — see runbook.
  tracing:
    sampling:
      probability: ${MEDCORE_TRACING_SAMPLING_PROBABILITY:0.1}
  otlp:
    tracing:
      endpoint: ${MEDCORE_OTLP_TRACING_ENDPOINT:}
    metrics:
      export:
        url: ${MEDCORE_OTLP_METRICS_URL:}
        step: ${MEDCORE_OTLP_METRICS_STEP:1m}
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
      group:
        liveness:
          # JVM is alive. Deliberately does NOT depend on DB —
          # restarting the app will not fix a DB outage, so a
          # liveness probe failing on DB down would just cause
          # unhelpful restart storms.
          include: livenessState
        readiness:
          # App is ready to serve traffic. Runtime datasource
          # (medcore_app role) MUST be reachable for a `SELECT 1`
          # to succeed; this is what makes readiness a meaningful
          # proof that the request-path is healthy, not merely
          # that the JVM is up.
          include: readinessState,db

server:
  port: 8080
  shutdown: graceful
