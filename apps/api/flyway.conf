# Flyway configuration — SINGLE SOURCE OF TRUTH.
#
# Phase 3H (ADR-006): this file is consumed by BOTH:
#   - the Gradle Flyway plugin (dev + CI)
#   - the Flyway CLI container (production, docker/flyway-migrator/)
#
# The Spring Boot application's in-process Flyway configuration in
# `application.yaml` MUST stay byte-equivalent to this file's policy
# directives. Any drift here is a production-migration incident
# waiting to happen — the drift is the bug.
#
# ### What lives here
#
# Policy (schemas, locations, baseline behaviour, validation mode)
# lives here — the static shape of how Medcore migrations run.
#
# ### What does NOT live here
#
# Secrets (passwords, connection URLs with credentials) MUST NEVER
# land in this file; they come from environment variables at run
# time. This file is committed; secrets are not.

# --- Connection (env-var substitution; NEVER hard-coded) ---
flyway.url=${MEDCORE_DB_URL}
flyway.user=${MEDCORE_DB_MIGRATOR_USER}
flyway.password=${MEDCORE_DB_MIGRATOR_PASSWORD}

# --- Migration discovery ---
# Spring's classpath:-prefixed paths don't apply here; the Gradle
# plugin and CLI container both resolve these as filesystem paths
# relative to their working dirs. The Gradle plugin config maps
# them to `src/main/resources/db/migration/**`; the Dockerfile
# COPYs the same directory tree to `/flyway/sql/**`.
flyway.locations=filesystem:src/main/resources/db/migration/identity,filesystem:src/main/resources/db/migration/tenancy,filesystem:src/main/resources/db/migration/audit,filesystem:src/main/resources/db/migration/clinical,filesystem:src/main/resources/db/migration/flyway

# --- Schemas owned by Flyway ---
flyway.schemas=flyway,identity,tenancy,audit,clinical
flyway.defaultSchema=flyway

# --- Safety policy ---
# Never baseline an existing, non-empty DB silently. If the schema
# exists without Flyway history, ops must explicitly baseline via a
# one-off command.
flyway.baselineOnMigrate=false

# Validate every applied migration's checksum at every run. A
# migration file edited after it was applied will fail fast.
flyway.validateOnMigrate=true

# Enforce that Flyway will not "clean" (drop) the schema. Production
# MUST NOT have a clean-capable migrator.
flyway.cleanDisabled=true

# Do not output colored messages — CI log aggregators don't handle ANSI.
flyway.color=never
